services:
  loki:
    image: grafana/loki:2.9.0
    container_name: logdrain-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    environment:
      - LOKI_STORAGE_PATH=/loki
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - logdrain-network

  grafana:
    image: grafana/grafana:10.1.0
    container_name: logdrain-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_SECURITY_ADMIN_EMAIL=${GF_ADMIN_EMAIL}
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_DEFAULT_THEME=dark
      - GF_LOG_LEVEL=info
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - LOKI_URL=http://loki:3100
      - PROMETHEUS_URL=http://prometheus:9090
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - logdrain-network

  ingest:
    build:
      context: .
      dockerfile: ingest/Dockerfile
    container_name: logdrain-ingest
    ports:
      - "8001:8000"
    environment:
      - LOKI_HOST=http://loki:3100
      - LOKI_PUSH_PATH=/loki/api/v1/push
      - INGEST_PORT=8000
      - INGEST_LOG_LEVEL=INFO
      - INGEST_MAX_RETRIES=3
      - INGEST_BATCH_SIZE=100
      - ALLOWED_SERVICES=provectusquantus,projectboard,provectusquantus-build,projectboard-build
      - RAILWAY_WEBHOOK_SECRET=${RAILWAY_WEBHOOK_SECRET}
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - logdrain-network

  prometheus:
    build:
      context: .
      dockerfile: docker/prometheus.Dockerfile
    container_name: logdrain-prometheus
    ports:
      - "9090:9090"
    environment:
      - METRICS_TOKEN=${METRICS_TOKEN}
    volumes:
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - logdrain-network

  alertmanager:
    build:
      context: .
      dockerfile: docker/alertmanager.Dockerfile
    container_name: logdrain-alertmanager
    ports:
      - "9093:9093"
    environment:
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    restart: unless-stopped
    networks:
      - logdrain-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: logdrain-postgres-exporter
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=${PQ_DATABASE_URL:-postgresql://postgres:devpassword123@postgres:5432/provectus_trading_dev?sslmode=disable}
    restart: unless-stopped
    networks:
      - logdrain-network
      - pq-network

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: logdrain-redis-exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=${PQ_REDIS_URL:-redis://redis:6379}
    restart: unless-stopped
    networks:
      - logdrain-network
      - pq-network

volumes:
  loki-data:
  grafana-data:
  prometheus-data:

networks:
  logdrain-network:
    driver: bridge
  pq-network:
    external: true
    name: provectusquantus_trading-network
