global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'pq-api-local'
    metrics_path: /metrics
    scrape_interval: 15s
    authorization:
      credentials: __METRICS_TOKEN__
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          service: 'pq-api'
          environment: 'local'

  - job_name: 'pq-api-production'
    metrics_path: /metrics
    scheme: https
    scrape_interval: 30s
    authorization:
      credentials: __METRICS_TOKEN__
    static_configs:
      - targets: ['provectusquantus-api-production.up.railway.app']
        labels:
          service: 'pq-api'
          environment: 'production'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres'
          environment: 'local'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'
          environment: 'local'
