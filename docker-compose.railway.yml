services:
  loki:
    build:
      context: .
      dockerfile: docker/loki.Dockerfile
    volumes:
      - loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  grafana:
    build:
      context: .
      dockerfile: docker/grafana.Dockerfile
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
      - GF_SECURITY_ADMIN_EMAIL=${GF_ADMIN_EMAIL}
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_DEFAULT_THEME=dark
      - GF_LOG_LEVEL=info
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - LOKI_URL=${LOKI_URL:-http://loki:3100}
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://prometheus:9090}
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  ingest:
    build:
      context: .
      dockerfile: ingest/Dockerfile
    environment:
      - LOKI_HOST=${LOKI_HOST:-http://loki:3100}
      - LOKI_PUSH_PATH=/loki/api/v1/push
      - INGEST_PORT=${PORT:-8000}
      - INGEST_LOG_LEVEL=INFO
      - INGEST_MAX_RETRIES=3
      - INGEST_BATCH_SIZE=100
      - ALLOWED_SERVICES=${ALLOWED_SERVICES}
      - RAILWAY_WEBHOOK_SECRET=${RAILWAY_WEBHOOK_SECRET}
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    build:
      context: .
      dockerfile: docker/prometheus.Dockerfile
    environment:
      - METRICS_TOKEN=${METRICS_TOKEN}
    volumes:
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  alertmanager:
    build:
      context: .
      dockerfile: docker/alertmanager.Dockerfile
    environment:
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    restart: unless-stopped

volumes:
  loki-data:
  prometheus-data:
