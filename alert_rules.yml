groups:
  - name: pq-api
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{job=~"pq-api.*", environment="production", status=~"5.."}[5m]) / rate(http_requests_total{job=~"pq-api.*", environment="production"}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job=~"pq-api.*", environment="production"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency on {{ $labels.job }}"
          description: "95th percentile latency is {{ $value }}s over the last 5 minutes."

      - alert: ServiceDown
        expr: up{environment="production"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.instance }} has been unreachable for more than 1 minute."

  - name: infrastructure
    rules:
      - alert: LokiDown
        expr: up{job="loki"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Loki is down"
          description: "Loki has been unreachable for more than 2 minutes."

      - alert: HighIngestErrorRate
        expr: rate(http_requests_total{job="ingest",status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High ingest error rate"
          description: "Ingest proxy is returning errors at {{ $value }}/s."

  - name: postgres
    rules:
      - alert: PostgresDown
        expr: up{job=~"postgres.*", environment="production"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL exporter is down"
          description: "PostgreSQL exporter has been unreachable for more than 1 minute."

      - alert: PostgresTooManyConnections
        expr: pg_stat_activity_count{environment="production"} > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL too many connections"
          description: "PostgreSQL has {{ $value }} active connections (threshold: 80)."

      - alert: PostgresSlowQueries
        expr: pg_stat_activity_max_tx_duration{environment="production", datname!~"template.*"} > 300
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL slow queries"
          description: "PostgreSQL has queries running longer than 5 minutes."

      - alert: PostgresDeadlocks
        expr: increase(pg_stat_database_deadlocks{environment="production"}[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL deadlocks detected"
          description: "{{ $value }} deadlocks detected in the last 5 minutes."

  - name: redis
    rules:
      - alert: RedisDown
        expr: up{job=~"redis.*", environment="production"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis exporter is down"
          description: "Redis exporter has been unreachable for more than 1 minute."

      - alert: RedisHighMemoryUsage
        expr: redis_memory_max_bytes{environment="production"} > 0 and redis_memory_used_bytes{environment="production"} / redis_memory_max_bytes{environment="production"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis high memory usage"
          description: "Redis is using {{ $value | humanizePercentage }} of max memory."

      - alert: RedisTooManyConnections
        expr: redis_connected_clients{environment="production"} > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis too many connections"
          description: "Redis has {{ $value }} connected clients."
