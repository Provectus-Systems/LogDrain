global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.resend.com:587'
  smtp_from: 'PQ Alerts <onboarding@resend.dev>'
  smtp_auth_username: 'resend'
  smtp_auth_password: '__SMTP_PASSWORD__'
  smtp_require_tls: true

route:
  group_by: ['alertname']
  group_wait: 2m
  group_interval: 10m
  repeat_interval: 4h
  receiver: 'email'
  routes:
    - match:
        severity: critical
      receiver: 'email-critical'
      repeat_interval: 4h

receivers:
  - name: 'email'
    email_configs:
      - to: 'alexlorenzo39@gmail.com'
        send_resolved: true
        headers:
          Subject: '[PQ Alert] {{ .GroupLabels.alertname }} - {{ .Status | toUpper }}'
        html: |
          <h2>{{ .Status | toUpper }}: {{ .GroupLabels.alertname }}</h2>
          <p><strong>Severity:</strong> {{ .CommonLabels.severity }}</p>
          {{ range .Alerts }}
          <hr>
          <p><strong>{{ .Annotations.summary }}</strong></p>
          <p>{{ .Annotations.description }}</p>
          <p><small>Started: {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}</small></p>
          {{ if .EndsAt }}<p><small>Ended: {{ .EndsAt.Format "2006-01-02 15:04:05 UTC" }}</small></p>{{ end }}
          {{ end }}

  - name: 'email-critical'
    email_configs:
      - to: 'alexlorenzo39@gmail.com'
        send_resolved: true
        headers:
          Subject: '[PQ CRITICAL] {{ .GroupLabels.alertname }} - {{ .Status | toUpper }}'
        html: |
          <h2 style="color: red;">CRITICAL: {{ .GroupLabels.alertname }}</h2>
          <p><strong>Severity:</strong> {{ .CommonLabels.severity }}</p>
          {{ range .Alerts }}
          <hr>
          <p><strong>{{ .Annotations.summary }}</strong></p>
          <p>{{ .Annotations.description }}</p>
          <p><small>Started: {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}</small></p>
          {{ if .EndsAt }}<p><small>Ended: {{ .EndsAt.Format "2006-01-02 15:04:05 UTC" }}</small></p>{{ end }}
          {{ end }}

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
