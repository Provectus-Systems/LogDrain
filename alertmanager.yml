global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 1h

receivers:
  - name: 'default'
    # Configure email or Slack webhook here
    # email_configs:
    #   - to: 'alerts@example.com'
    #     from: 'alertmanager@logdrain.local'
    #     smarthost: 'smtp.gmail.com:587'
    #     auth_username: '{{ .EmailUser }}'
    #     auth_password: '{{ .EmailPassword }}'

  - name: 'critical'
    # Configure critical alert routing here
    # slack_configs:
    #   - api_url: '{{ .SlackWebhookURL }}'
    #     channel: '#alerts-critical'
    #     title: '{{ .GroupLabels.alertname }}'
    #     text: '{{ .CommonAnnotations.description }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
